<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="max-age=0">
  <meta http-equiv="Expires" content="0">
  <title>পশ্চিমবঙ্গ ভূগোল কুইজ • Mega Quiz</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      background: #f0f2f5;
      background-attachment: fixed;
      color: #111;
      line-height: 1.5;
      position: relative;
      overflow-x: hidden;
    }

    .warning-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(6px);
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
    }

    .warning-overlay.slide-away {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
    }

    .warning-card {
      background: white;
      max-width: 500px;
      width: 90%;
      padding: 32px 24px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 30px 50px rgba(0,0,0,0.3);
      animation: pop-in 0.3s ease-out;
    }

    @keyframes pop-in {
      0% { transform: scale(0.9); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .warning-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .warning-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: #b22222;
      margin-bottom: 20px;
      line-height: 1.7;
    }

    .warning-btn {
      background: #1e3a8a;
      color: white;
      border: none;
      padding: 14px 40px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
      box-shadow: 0 4px 10px rgba(30,58,138,0.3);
    }

    .warning-btn:hover {
      background: #152c6b;
    }

    .quiz-card {
      background: #ffffff;
      width: 100%;
      max-width: 1000px;
      padding: 0;
      border-radius: 28px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #e9ecef;
      position: relative;
      overflow: hidden;
    }

    /* HEADER WITH BLACK BACKGROUND */
    .quiz-header {
      background: #000000; /* Black */
      color: #ffffff;
      padding: 24px 28px 18px;
      border-bottom: none;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      position: relative; /* so absolute children (buttons, watermark) are positioned within */
    }

    .header-main {
      display: flex;
      flex-direction: column;
    }

    .school-title {
      font-size: 1.7rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.2px;
    }

    .subject-line {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e0e7ff;
      margin-top: 4px;
    }

    .class-line {
      font-size: 0.95rem;
      font-weight: 500;
      color: #cbd5e1;
      margin-top: 2px;
    }

    /* Buttons inside header */
    .reset-tiny {
      position: absolute;
      top: 18px;
      right: 16px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #ffffff;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 5;
      backdrop-filter: blur(4px);
    }

    .reset-tiny:hover {
      background: rgba(255,255,255,0.25);
      border-color: #ffffff;
    }

    .confetti-toggle {
      position: absolute;
      top: 18px;
      right: 85px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      color: #ffffff;
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      gap: 4px;
      z-index: 5;
      backdrop-filter: blur(4px);
    }

    .confetti-toggle:hover {
      background: rgba(255,255,255,0.25);
    }

    /* Watermark: by Arif Hussain – placed right below reset button */
    .author-watermark {
      position: absolute;
      top: 44px; /* just below reset button (18px + ~26px height) */
      right: 16px;
      font-size: 0.8rem;
      color: #ffffff;
      pointer-events: none;
      z-index: 1;
    }

    /* Body content wrapper */
    .quiz-body-inner {
      padding: 22px 28px 20px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .score-badge {
      background: #1e3a8a;
      color: white;
      padding: 5px 18px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      box-shadow: 0 3px 0 #0f2557;
      letter-spacing: 0.3px;
    }

    .progress-bar {
      height: 7px;
      background: #e9ecef;
      border-radius: 20px;
      margin: 12px 0 16px;
      overflow: hidden;
    }

    #progress {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.2s;
      border-radius: 20px;
    }

    .question-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
      gap: 8px;
    }

    .question-text {
      font-size: 1.35rem;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.4;
      border-left: 5px solid #2563eb;
      padding-left: 16px;
      flex: 1;
    }

    .hide-toggle-btn {
      background: #f1f5f9;
      border: 1.5px solid #64748b;
      color: #1e293b;
      padding: 5px 14px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .hide-toggle-btn:hover {
      background: #e2e8f0;
      border-color: #334155;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
      transition: opacity 0.2s;
    }

    .options-grid.hidden-options {
      opacity: 0;
      pointer-events: none;
    }

    .option-btn {
      padding: 14px 16px;
      border: 1.8px solid #cbd5e1;
      border-radius: 18px;
      background: white;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 500;
      text-align: left;
      transition: all 0.15s;
      color: #0f172a;
      box-shadow: 0 2px 0 #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .option-btn:hover:not(:disabled) {
      background: #f8fafc;
      border-color: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #bfdbfe;
    }

    .opt-prefix {
      font-weight: 800;
      background: #e2e8f0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 30px;
      color: #1e293b;
      flex-shrink: 0;
    }

    .correct {
      background: #10b981 !important;
      color: white !important;
      border-color: #047857 !important;
      box-shadow: 0 4px 0 #065f46 !important;
    }

    .correct .opt-prefix {
      background: #047857;
      color: white;
    }

    .wrong {
      background: #ef4444 !important;
      color: white !important;
      border-color: #b91c1c !important;
      box-shadow: 0 4px 0 #991b1b !important;
    }

    .wrong .opt-prefix {
      background: #b91c1c;
      color: white;
    }

    .note-box {
      background: #f0f9ff;
      border-left: 5px solid #2563eb;
      border-radius: 14px;
      padding: 12px 16px;
      margin: 12px 0 8px;
      font-size: 0.9rem;
      color: #1e293b;
      display: none;
    }

    .note-box.show {
      display: block;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 12px 0 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border: 1px solid #cbd5e1;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      background: #f1f5f9;
      color: #1e293b;
      box-shadow: 0 2px 0 #e2e8f0;
      transition: 0.1s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 100px;
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #e2e8f0;
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
      background: #f8fafc;
      border-color: #e2e8f0;
      color: #94a3b8;
    }

    .btn-primary {
      background: #1e3a8a;
      color: white;
      border: none;
      box-shadow: 0 4px 0 #0f2557;
    }

    .btn-primary:disabled {
      background: #94a3b8;
      box-shadow: 0 4px 0 #64748b;
      color: #f1f5f9;
    }

    .nav-panel {
      margin-top: 24px;
      border-top: 1.5px solid #e9ecef;
      padding-top: 16px;
    }

    .nav-title {
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .legend span {
      margin-right: 16px;
      font-size: 0.8rem;
    }

    .q-grid {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
      padding: 6px 2px;
      background: #f8fafc;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
    }

    .q-btn {
      background: white;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.7rem;
      padding: 5px 0;
      cursor: pointer;
      color: #1e293b;
      text-align: center;
      transition: 0.1s;
    }

    .q-btn:hover {
      background: #e0e7ff;
      border-color: #2563eb;
    }

    .q-correct {
      background: #10b981 !important;
      border-color: #047857 !important;
      color: white !important;
    }

    .q-wrong {
      background: #ef4444 !important;
      border-color: #b91c1c !important;
      color: white !important;
    }

    .q-unattempted {
      background: white;
      border: 1px solid #cbd5e1;
    }

    .jump-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0 6px;
      flex-wrap: wrap;
    }

    #jump-input {
      width: 70px;
      padding: 7px;
      border-radius: 30px;
      border: 1px solid #cbd5e1;
      text-align: center;
      font-weight: bold;
    }

    .creator-tag {
      text-align: center;
      margin-top: 18px;
      color: #64748b;
      font-size: 0.75rem;
      letter-spacing: 0.2px;
    }

    .result-screen {
      text-align: center;
      display: none;
      padding: 40px 20px;
    }

    @media (max-width: 650px) {
      .options-grid {
        grid-template-columns: 1fr;
      }
      .q-grid {
        grid-template-columns: repeat(10, 1fr);
      }
      .question-text {
        font-size: 1.2rem;
      }
      .question-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .hide-toggle-btn {
        margin-left: 0;
      }
      .reset-tiny, .confetti-toggle {
        font-size: 0.65rem;
        padding: 2px 8px;
      }
    }
  </style>
</head>
<body>

  <!-- WARNING OVERLAY -->
  <div class="warning-overlay" id="warningOverlay">
    <div class="warning-card">
      <div class="warning-icon">⚠️</div>
      <div class="warning-text">
        ছেলে-মেয়েকে একা মোবাইল ছেড়ে পড়তে দেবেন না। যখনই দেবেন, অভিভাবক পাশে বসে নজরে রাখবেন।
      </div>
      <button class="warning-btn" id="warningDismissBtn">পরবর্তী</button>
    </div>
  </div>

  <!-- MAIN QUIZ CARD -->
  <div class="quiz-card" id="quizCard" style="display: none;">
    <!-- HEADER WITH BLACK BACKGROUND -->
    <div class="quiz-header">
      <div class="header-main">
        <div class="school-title">Mega Quiz</div>
        <div class="subject-line">🗺️ Class - V</div>
        <div class="class-line">পশ্চিমবঙ্গ ভূগোল • পরিবেশ ও অঞ্চল</div>
      </div>
      <!-- Buttons and watermark inside header -->
      <button class="confetti-toggle" id="confettiToggleBtn" onclick="toggleConfetti()">🎉 অন</button>
      <button class="reset-tiny" onclick="resetProgress()" title="সব মুছে শুরু">🔄 রিসেট</button>
      <span class="author-watermark" id="authorWatermark"></span>
    </div>

    <!-- Body content wrapper -->
    <div class="quiz-body-inner">
      <div id="quiz-box">
        <div class="top-bar">
          <span id="q-number" style="font-weight:700; color:#1e293b;">প্রশ্ন ১/৮৫</span>
          <div class="score-badge" id="score-display">🏆 ০</div>
        </div>
        <div class="progress-bar"><div id="progress"></div></div>

        <div class="question-header">
          <div class="question-text" id="question">লোড হচ্ছে...</div>
          <button class="hide-toggle-btn" id="toggle-options-btn" onclick="toggleOptions()">👁️ Hide</button>
        </div>

        <div class="options-grid" id="options"></div>
        <div id="note-box" class="note-box"></div>

        <div class="controls">
          <button class="btn" id="back-btn" onclick="goBack()">⬅️ পিছনে</button>
          <button class="btn btn-primary" id="next-btn" onclick="goNext()">পরবর্তী 🚀</button>
        </div>

        <div class="nav-panel">
          <div class="nav-title">
            <span>📌 নেভিগেশন</span>
            <div class="legend"><span>🟢 সঠিক</span><span>🔴 ভুল</span><span>⚪ দেখা হয়নি</span></div>
          </div>
          <div class="jump-section">
            <label>Jump:</label>
            <input type="number" id="jump-input" min="1" max="85" value="1">
            <button class="btn" onclick="jumpToQuestion()" style="padding:6px 14px;">যাও</button>
            <span style="margin-left:10px; color:#475569;">মোট: ৮৫</span>
          </div>
          <div class="q-grid" id="question-grid"></div>
        </div>
      </div>

      <div id="result-box" class="result-screen">
        <h1 style="font-size:3.5rem;">🎉</h1>
        <h2>কুইজ সম্পন্ন!</h2>
        <p style="font-size:1.8rem; margin:20px 0; color:#1e293b;">আপনার স্কোর: <span id="final-score">0</span></p>
        <button class="btn btn-primary" onclick="resetAndRestart()">আবার শুরু</button>
      </div>
      <div class="creator-tag">✦ প্রশ্নোত্তর ও ব্যাখ্যা • Mega Quiz ✦</div>
    </div>
  </div>

<script>
  (function() {
    // ========== EXTREMELY OBFUSCATED AUTHOR WATERMARK ==========
    (function installAuthorTag() {
      var _X = [117,84,99,24,126,75,94,110,18,126,101,82,77,94,44];
      var _K = [23,45,67,89,12,34,56,78,90,11,22,33,44,55,66];
      var _R = [];
      for (var _i = 0; _i < _X.length; _i++) {
        _R.push(_X[_i] ^ _K[_i]);
      }
      var _A = String.fromCharCode.apply(null, _R); // "by Arif Hussain"
      
      // Set to the span we placed in the header
      var _W = document.getElementById('authorWatermark');
      if (_W) _W.textContent = _A;
    })();
    // =================================================================

    const quizDataTemplate = [
      { q: "পশ্চিমবঙ্গের ভূমির ঢাল কোন দিক থেকে কোন দিকে বিস্তৃত?     *", o: ["দক্ষিণ থেকে উত্তরে এবং পূর্ব থেকে পশ্চিমে","উত্তর থেকে দক্ষিণে এবং পশ্চিম থেকে পূর্বে","শুধুমাত্র পশ্চিম থেকে পূর্বে","উত্তর থেকে পশ্চিমে"], a:1, note:"উত্তর দিকের হিমালয় এবং পশ্চিমের মালভূমি উঁচু হওয়ায় পশ্চিমবঙ্গের সাধারণ ঢাল দক্ষিণ ও পূর্ব দিকে।" },
      { q: "পশ্চিমবঙ্গের বেশিরভাগ নদী কোন দিকে প্রবাহিত হয়েছে?     **", o: ["উত্তর থেকে দক্ষিণে","দক্ষিণ থেকে উত্তরে","পূর্ব থেকে পশ্চিমে","দক্ষিণ থেকে পূর্বে"], a:0, note:"ভূমির স্বাভাবিক ঢাল অনুসরণ করেই নদীগুলো উত্তর থেকে দক্ষিণে প্রবাহিত।" },
      { q: "দামোদর নদী দক্ষিণে গিয়ে কোন নদীতে মিশেছে?     ***", o: ["পদ্মা","যমুনা","গঙ্গা/হুগলি নদী","ইছামতী"], a:2, note:"দামোদর গঙ্গার একটি অন্যতম উপনদী।" },
      { q: "দামোদর যেখানে গঙ্গার সঙ্গে মিশেছে, সেখানে গঙ্গার নাম কী?", o: ["মেঘনা","ভাগীরথী","হুগলি নদী","রূপনারায়ণ"], a:2, note:"মুর্শিদাবাদের পর গঙ্গার মূল প্রবাহটি ভাগীরথী-হুগলি নামে পরিচিত।" },

      { q: "ভারতের প্রথম আইআইটি (IIT) শিক্ষা কেন্দ্র কোথায়?     **", o: ["দুর্গাপুর","কলকাতা","হলদিয়া","খড়গপুর"], a:3, note:"১৯৫১ সালে প্রতিষ্ঠিত।" },
      { q: "হুগলি জেলার ডানকুনি শহরটি কিসের জন্য বিখ্যাত?     *", o: ["তাঁত শিল্প","দুধ সংরক্ষণ কেন্দ্র (মাদার ডেয়ারি)","সিমেন্ট কারখানা","পর্যটন কেন্দ্র"], a:1, note:"কলকাতার কাছে গুরুত্বপূর্ণ শিল্প ও যাতায়াত কেন্দ্র।" },
      { q: "শান্তিনিকেতন বা বিশ্বভারতী বিশ্ববিদ্যালয়ের প্রতিষ্ঠাতা কে?     ****", o: ["রাজা রামমোহন রায়","বিদ্যাসাগর","বিবেকানন্দ","রবীন্দ্রনাথ ঠাকুর"], a:3, note:"বোলপুরে অবস্থিত এই বিশ্ববিদ্যালয় বিশ্ববিখ্যাত।" }
    ];

    const TOTAL_Q = quizDataTemplate.length;
    const STORAGE_KEY = 'wb-geo-quiz-v7';

    // State
    let currentQuizData = [];
    let currentIdx = 0, score = 0;
    let userAnswers = new Array(TOTAL_Q).fill(null);
    let optionsHidden = false;
    let confettiEnabled = true;

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateShuffledQuiz() {
      return quizDataTemplate.map(item => {
        let indices = item.o.map((_, i) => i);
        indices = shuffleArray([...indices]);
        const shuffledOptions = indices.map(i => item.o[i]);
        const newCorrectIndex = indices.indexOf(item.a);
        return {
          q: item.q,
          o: shuffledOptions,
          a: newCorrectIndex,
          note: item.note
        };
      });
    }

    function saveFullState() {
      try {
        const state = {
          currentIdx,
          score,
          userAnswers,
          optionsHidden,
          confettiEnabled,
          shuffledQuiz: currentQuizData
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch(e) {}
    }

    function loadFullState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed && typeof parsed.currentIdx === 'number' &&
              Array.isArray(parsed.userAnswers) && parsed.userAnswers.length === TOTAL_Q &&
              Array.isArray(parsed.shuffledQuiz) && parsed.shuffledQuiz.length === TOTAL_Q) {
            currentIdx = parsed.currentIdx;
            score = parsed.score;
            userAnswers = parsed.userAnswers;
            optionsHidden = parsed.optionsHidden || false;
            confettiEnabled = parsed.confettiEnabled !== undefined ? parsed.confettiEnabled : true;
            currentQuizData = parsed.shuffledQuiz;
            return true;
          }
        }
      } catch(e) {}
      return false;
    }

    function clearAllProgress() {
      localStorage.removeItem(STORAGE_KEY);
      currentQuizData = generateShuffledQuiz();
      currentIdx = 0;
      score = 0;
      userAnswers = new Array(TOTAL_Q).fill(null);
      optionsHidden = false;
    }

    // DOM refs
    const qText = document.getElementById('question');
    const optGrid = document.getElementById('options');
    const nextBtn = document.getElementById('next-btn');
    const backBtn = document.getElementById('back-btn');
    const qNumberSpan = document.getElementById('q-number');
    const scoreDisplay = document.getElementById('score-display');
    const progressBar = document.getElementById('progress');
    const gridDiv = document.getElementById('question-grid');
    const noteBox = document.getElementById('note-box');
    const toggleBtn = document.getElementById('toggle-options-btn');
    const confettiToggleBtn = document.getElementById('confettiToggleBtn');

    function updateConfettiButton() {
      confettiToggleBtn.textContent = confettiEnabled ? '🎉 অন' : '🎉 অফ';
    }

    window.toggleConfetti = function() {
      confettiEnabled = !confettiEnabled;
      updateConfettiButton();
      saveFullState();
    };

    function fireConfetti() {
      if (confettiEnabled && typeof confetti === 'function') {
        confetti({
          particleCount: 100,
          spread: 70,
          origin: { y: 0.6 },
          colors: ['#2563eb', '#10b981', '#f59e0b', '#ef4444']
        });
      }
    }

    window.toggleOptions = function() {
      optionsHidden = !optionsHidden;
      optGrid.classList.toggle('hidden-options', optionsHidden);
      toggleBtn.innerHTML = optionsHidden ? '👁️ Show' : '👁️ Hide';
      saveFullState();
    };

    function renderQuestion() {
      const data = currentQuizData[currentIdx];
      qText.innerText = `${currentIdx+1}. ${data.q}`;
      optGrid.innerHTML = '';
      backBtn.disabled = (currentIdx === 0);
      nextBtn.disabled = false;
      const answered = userAnswers[currentIdx];
      const isAnswered = (answered !== null);

      if (optionsHidden) optGrid.classList.add('hidden-options');
      else optGrid.classList.remove('hidden-options');

      data.o.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        const prefix = String.fromCharCode(65+idx);
        btn.innerHTML = `<span class="opt-prefix">${prefix}</span> ${opt}`;
        if (isAnswered) {
          btn.disabled = true;
          if (idx === data.a) btn.classList.add('correct');
          else if (answered === idx) btn.classList.add('wrong');
        } else {
          btn.onclick = () => handleAnswer(idx);
        }
        optGrid.appendChild(btn);
      });

      if (isAnswered) {
        noteBox.innerText = `📝 ${data.note}`;
        noteBox.classList.add('show');
      } else {
        noteBox.classList.remove('show');
      }

      progressBar.style.width = ((currentIdx+1)/TOTAL_Q)*100 + '%';
      qNumberSpan.innerText = `প্রশ্ন ${currentIdx+1} / ${TOTAL_Q}`;
      scoreDisplay.innerText = `🏆 ${score}`;

      document.getElementById('jump-input').value = currentIdx + 1;
      renderNavGrid();
      saveFullState();
    }

    function handleAnswer(sel) {
      if (userAnswers[currentIdx] !== null) return;
      userAnswers[currentIdx] = sel;
      if (sel === currentQuizData[currentIdx].a) {
        score++;
        fireConfetti();
      }
      renderQuestion();
    }

    window.goNext = function() {
      if (currentIdx < TOTAL_Q-1) { currentIdx++; renderQuestion(); }
      else showResult();
    };

    window.goBack = function() {
      if (currentIdx > 0) { currentIdx--; renderQuestion(); }
    };

    window.jumpToQuestion = function() {
      let num = parseInt(document.getElementById('jump-input').value, 10);
      if (isNaN(num) || num<1) num=1; else if(num>TOTAL_Q) num=TOTAL_Q;
      currentIdx = num-1;
      renderQuestion();
      document.getElementById('jump-input').value = currentIdx+1;
    };

    function renderNavGrid() {
      let html = '';
      for (let i=0; i<TOTAL_Q; i++) {
        let cls = 'q-btn';
        const ans = userAnswers[i];
        if (ans !== null) {
          cls += (ans === currentQuizData[i].a) ? ' q-correct' : ' q-wrong';
        } else {
          cls += ' q-unattempted';
        }
        html += `<div class="${cls}" onclick="goToQuestion(${i})">${i+1}</div>`;
      }
      gridDiv.innerHTML = html;
    }

    window.goToQuestion = function(idx) {
      currentIdx = idx;
      renderQuestion();
      document.getElementById('jump-input').value = currentIdx+1;
    };

    function showResult() {
      document.getElementById('quiz-box').style.display = 'none';
      document.getElementById('result-box').style.display = 'block';
      document.getElementById('final-score').innerText = `${score} / ${TOTAL_Q}`;
      saveFullState();
    }

    window.resetProgress = function() {
      if (confirm('আপনি কি নিশ্চিত যে সব অগ্রগতি মুছে পুনরায় শুরু করতে চান?')) {
        clearAllProgress();
        document.getElementById('result-box').style.display = 'none';
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('jump-input').value = 1;
        updateConfettiButton();
        renderQuestion();
      }
    };

    window.resetAndRestart = function() {
      clearAllProgress();
      document.getElementById('result-box').style.display = 'none';
      document.getElementById('quiz-box').style.display = 'block';
      document.getElementById('jump-input').value = 1;
      updateConfettiButton();
      renderQuestion();
    };

    // Warning overlay dismiss
    document.getElementById('warningDismissBtn').addEventListener('click', function() {
      document.getElementById('warningOverlay').classList.add('slide-away');
      setTimeout(() => {
        document.getElementById('warningOverlay').style.display = 'none';
        document.getElementById('quizCard').style.display = 'block';
      }, 500);
    });

    // Init
    function init() {
      const hasSaved = loadFullState();
      if (!hasSaved) {
        currentQuizData = generateShuffledQuiz();
        currentIdx = 0;
        score = 0;
        userAnswers = new Array(TOTAL_Q).fill(null);
        optionsHidden = false;
        saveFullState();
      }
      updateConfettiButton();
      const allAnswered = userAnswers.every(a => a !== null);
      if (allAnswered && currentIdx >= TOTAL_Q - 1) {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('final-score').innerText = `${score} / ${TOTAL_Q}`;
        document.getElementById('quizCard').style.display = 'block';
      } else {
        document.getElementById('quiz-box').style.display = 'block';
        document.getElementById('result-box').style.display = 'none';
        if (currentIdx >= TOTAL_Q) currentIdx = TOTAL_Q - 1;
        renderQuestion();
      }
    }

    init();
  })();
</script>
</body>
</html>
