<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Competitive Exams</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000010;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            font-family: 'Hind Siliguri', 'Noto Sans Bengali', sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            position: relative;
        }

        canvas#galaxyCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: auto;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #fff;
            width: 90%;
            max-width: 600px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 12vh auto 0 auto;
        }

        .main-title .title-bengali {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5), 0 0 60px rgba(180, 200, 255, 0.35);
            letter-spacing: 1px;
            pointer-events: none;
            line-height: 1.3;
            margin-bottom: 2px;
        }

        .main-title .title-sub {
            font-family: 'Orbitron', 'Hind Siliguri', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 34px;
            opacity: 0.75;
            color: #ccc;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .nav-row {
            display: flex;
            gap: clamp(20px, 5vw, 50px);
            flex-wrap: nowrap;
            justify-content: center;
            pointer-events: auto;
            margin-bottom: 18px;
        }

        .nav-link {
            font-family: 'Hind Siliguri', sans-serif;
            font-size: clamp(1rem, 2vw, 1.3rem);
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.06em;
            background: none;
            border: none;
            padding: 10px 16px;
            text-shadow: 0 0 20px currentColor;
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .nav-link .emoji {
            font-size: 1.3em;
            display: inline-block;
            filter: drop-shadow(0 0 10px currentColor);
            transition: transform 0.3s ease;
        }

        .nav-link:hover .emoji {
            transform: scale(1.2) rotate(-5deg);
        }

        .nav-link.ssc {
            color: #FFB74D;
            text-shadow: 0 0 22px #ff9800;
        }

        .nav-link.def {
            color: #EF5350;
            text-shadow: 0 0 22px #f44336;
        }

        .nav-link.wb {
            color: #4DD0E1;
            text-shadow: 0 0 22px #00bcd4;
        }

        .nav-link:hover {
            transform: scale(1.1);
            text-shadow: 0 0 35px currentColor;
            filter: brightness(1.5);
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2.5px;
            background: currentColor;
            transition: width 0.3s ease;
            border-radius: 3px;
        }

        .nav-link:hover::after {
            width: 90%;
        }

        .footer-fixed {
            position: fixed;
            bottom: 12px;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 2;
            pointer-events: auto;
            font-size: 0.7rem;
            color: #ccc;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
            opacity: 0.85;
            letter-spacing: 0.3px;
            line-height: 1.6;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 0 10px;
            background: transparent;
            backdrop-filter: none;
        }

        .footer-item {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #ddd;
            text-decoration: none;
            font-weight: 500;
            padding: 4px 7px;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            white-space: nowrap;
            cursor: pointer;
            position: relative;
            text-shadow: 0 0 6px rgba(255, 255, 255, 0.25);
            letter-spacing: 0.2px;
        }

        .footer-item svg {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.2));
        }

        .footer-item:hover {
            color: #fff;
            text-shadow: 0 0 16px rgba(255, 255, 255, 0.85), 0 0 32px rgba(180, 210, 255, 0.7), 0 0 48px rgba(150, 180, 255, 0.4);
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(180, 200, 255, 0.2);
        }

        .footer-item:hover svg {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8)) drop-shadow(0 0 14px rgba(180, 210, 255, 0.6));
            transform: scale(1.1);
        }

        .footer-item:active {
            transform: translateY(-1px);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.95), 0 0 38px rgba(200, 220, 255, 0.8);
        }

        .footer-sep {
            display: inline-block;
            margin: 0 5px;
            opacity: 0.45;
            color: #999;
            pointer-events: none;
            font-weight: 300;
            user-select: none;
            -webkit-user-select: none;
            font-size: 0.75rem;
            line-height: 1;
        }

        .footer-item .upi-detail {
            letter-spacing: 0.1px;
        }

        .footer-item.ig-item:hover {
            text-shadow: 0 0 16px rgba(255, 150, 180, 0.9), 0 0 32px rgba(255, 100, 150, 0.6), 0 0 48px rgba(255, 80, 130, 0.35);
            box-shadow: 0 0 22px rgba(255, 130, 170, 0.25);
        }

        .footer-item.ig-item:hover svg {
            filter: drop-shadow(0 0 8px rgba(255, 140, 170, 0.9)) drop-shadow(0 0 14px rgba(255, 100, 150, 0.6));
        }

        .footer-item.tg-item:hover {
            text-shadow: 0 0 16px rgba(140, 200, 255, 0.9), 0 0 32px rgba(100, 180, 255, 0.6), 0 0 48px rgba(80, 160, 255, 0.35);
            box-shadow: 0 0 22px rgba(120, 190, 255, 0.25);
        }

        .footer-item.tg-item:hover svg {
            filter: drop-shadow(0 0 8px rgba(130, 200, 255, 0.9)) drop-shadow(0 0 14px rgba(100, 180, 255, 0.6));
        }

        .footer-item.email-item:hover {
            text-shadow: 0 0 16px rgba(255, 220, 140, 0.9), 0 0 32px rgba(255, 200, 100, 0.6), 0 0 48px rgba(255, 180, 80, 0.35);
            box-shadow: 0 0 22px rgba(255, 210, 130, 0.25);
        }

        .footer-item.email-item:hover svg {
            filter: drop-shadow(0 0 8px rgba(255, 210, 130, 0.9)) drop-shadow(0 0 14px rgba(255, 190, 100, 0.6));
        }

        .footer-item.upi-item:hover {
            text-shadow: 0 0 16px rgba(160, 255, 180, 0.9), 0 0 32px rgba(120, 240, 150, 0.6), 0 0 48px rgba(100, 220, 130, 0.35);
            box-shadow: 0 0 22px rgba(140, 240, 170, 0.25);
        }

        .footer-item.upi-item:hover svg {
            filter: drop-shadow(0 0 8px rgba(150, 250, 170, 0.9)) drop-shadow(0 0 14px rgba(120, 230, 150, 0.6));
        }

        @media (max-width: 520px) {
            .footer-fixed {
                font-size: 0.6rem;
                bottom: 6px;
                gap: 0px;
                padding: 0 4px;
                line-height: 1.5;
            }
            .footer-item {
                padding: 3px 5px;
                gap: 2px;
            }
            .footer-item svg {
                width: 15px;
                height: 15px;
            }
            .footer-sep {
                margin: 0 2px;
                font-size: 0.6rem;
            }
        }

        @media (max-width: 380px) {
            .footer-fixed {
                font-size: 0.52rem;
                bottom: 4px;
                padding: 0 2px;
            }
            .footer-item {
                padding: 2px 3px;
                gap: 1px;
            }
            .footer-item svg {
                width: 13px;
                height: 13px;
            }
            .footer-sep {
                margin: 0 1px;
                font-size: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .main-title .title-bengali {
                font-size: 1.6rem;
            }
            .nav-row {
                gap: 14px;
            }
            .nav-link {
                font-size: 0.8rem;
                padding: 6px 8px;
                gap: 4px;
            }
        }
    </style>
</head>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.getElementById('galaxyCanvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 0.5, 120);
        camera.position.set(0, 6.5, 17);
        camera.lookAt(0, 0.8, 0);

        const ambientLight = new THREE.AmbientLight(0x1a1a3a, 1.8);
        scene.add(ambientLight);
        const pointLight1 = new THREE.PointLight(0x8899cc, 25, 40, 1.5);
        pointLight1.position.set(5, 8, 10);
        scene.add(pointLight1);
        const pointLight2 = new THREE.PointLight(0xcc8866, 18, 35, 1.5);
        pointLight2.position.set(-6, -2, -5);
        scene.add(pointLight2);

        function createStarSpriteTexture(size = 64) {
            const c = document.createElement('canvas');
            c.width = size;
            c.height = size;
            const ctx = c.getContext('2d');
            const half = size / 2;
            const grad = ctx.createRadialGradient(half, half, 0, half, half, half);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.04, '#ffffff');
            grad.addColorStop(0.18, '#ffffee');
            grad.addColorStop(0.45, 'rgba(200,210,255,0.55)');
            grad.addColorStop(0.8, 'rgba(80,100,180,0.06)');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(c);
        }

        function createCoreGlowTexture(size = 512) {
            const c = document.createElement('canvas');
            c.width = size;
            c.height = size;
            const ctx = c.getContext('2d');
            const half = size / 2;
            const grad = ctx.createRadialGradient(half, half, 0, half, half, half);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.03, '#fffff8');
            grad.addColorStop(0.1, '#fff8e0');
            grad.addColorStop(0.3, '#ffd4a0');
            grad.addColorStop(0.55, '#cc88cc44');
            grad.addColorStop(0.8, '#44228811');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            return new THREE.CanvasTexture(c);
        }

        const starSpriteTex = createStarSpriteTexture();
        const coreGlowTex = createCoreGlowTexture();

        const galaxyGroup = new THREE.Group();
        galaxyGroup.rotation.x = -0.45;
        galaxyGroup.rotation.y = 0.25;
        scene.add(galaxyGroup);

        const numArms = 4, particlesPerArm = 2800, galaxyRadius = 13, armTightness = 2.8;
        const armParticlesTotal = numArms * particlesPerArm;
        const armPositions = new Float32Array(armParticlesTotal * 3);
        const armColors = new Float32Array(armParticlesTotal * 3);
        const armSizesArr = new Float32Array(armParticlesTotal);

        for (let arm = 0; arm < numArms; arm++) {
            const baseAngle = arm * Math.PI * 2 / numArms;
            for (let i = 0; i < particlesPerArm; i++) {
                const idx = arm * particlesPerArm + i;
                const t = i / particlesPerArm;
                const r = t * galaxyRadius;
                const spiralAngle = baseAngle + t * armTightness * Math.PI;
                const spreadAngle = (0.15 + t * 1.1) * 0.9;
                const angle = spiralAngle + (Math.random() - 0.5) * spreadAngle * 2;
                armPositions[idx * 3] = Math.cos(angle) * r;
                armPositions[idx * 3 + 1] = (Math.random() - 0.5) * (0.35 + t * 0.9) * (1 + t * 1.5);
                armPositions[idx * 3 + 2] = Math.sin(angle) * r;
                const wm = Math.max(0, 1 - t * 1.3);
                const cm = Math.max(0, (t - 0.25) * 1.4);
                armColors[idx * 3] = Math.min(1, 0.85 * wm + 0.35 * cm + 0.15 * Math.random());
                armColors[idx * 3 + 1] = Math.min(1, 0.7 * wm + 0.4 * cm + 0.2 * (1 - Math.abs(t - 0.5) * 2) + 0.1 * Math.random());
                armColors[idx * 3 + 2] = Math.min(1, 0.4 * wm + 0.85 * cm + 0.2 * Math.random());
                armSizesArr[idx] = (0.03 + Math.random() * 0.09) * (1 - t * 0.5);
            }
        }

        const armGeom = new THREE.BufferGeometry();
        armGeom.setAttribute('position', new THREE.BufferAttribute(armPositions, 3));
        armGeom.setAttribute('color', new THREE.BufferAttribute(armColors, 3));
        armGeom.setAttribute('size', new THREE.BufferAttribute(armSizesArr, 1));
        const armMat = new THREE.PointsMaterial({
            size: 0.12,
            map: starSpriteTex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.85,
            sizeAttenuation: true
        });
        galaxyGroup.add(new THREE.Points(armGeom, armMat));

        const bulgeCount = 2200, bulgeRadius = 2.8;
        const bulgePositions = new Float32Array(bulgeCount * 3);
        const bulgeColors = new Float32Array(bulgeCount * 3);
        for (let i = 0; i < bulgeCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = Math.pow(Math.random(), 1.8) * bulgeRadius;
            bulgePositions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
            bulgePositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r * 0.35;
            bulgePositions[i * 3 + 2] = Math.cos(phi) * r;
            const br = 0.7 + 0.3 * (1 - r / bulgeRadius);
            bulgeColors[i * 3] = br;
            bulgeColors[i * 3 + 1] = br * 0.9;
            bulgeColors[i * 3 + 2] = br * 0.7;
        }
        const bulgeGeom = new THREE.BufferGeometry();
        bulgeGeom.setAttribute('position', new THREE.BufferAttribute(bulgePositions, 3));
        bulgeGeom.setAttribute('color', new THREE.BufferAttribute(bulgeColors, 3));
        const bulgeMat = new THREE.PointsMaterial({
            size: 0.16,
            map: starSpriteTex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.9,
            sizeAttenuation: true
        });
        galaxyGroup.add(new THREE.Points(bulgeGeom, bulgeMat));

        const coreGlowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
            map: coreGlowTex,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.75,
            color: new THREE.Color('#fffef0')
        }));
        coreGlowSprite.scale.set(7, 7, 1);
        galaxyGroup.add(coreGlowSprite);

        const coreClusterCount = 600;
        const coreClusterPositions = new Float32Array(coreClusterCount * 3);
        const coreClusterColors = new Float32Array(coreClusterCount * 3);
        for (let i = 0; i < coreClusterCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = Math.pow(Math.random(), 3) * 1.2;
            coreClusterPositions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
            coreClusterPositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r * 0.3;
            coreClusterPositions[i * 3 + 2] = Math.cos(phi) * r;
            coreClusterColors[i * 3] = 1;
            coreClusterColors[i * 3 + 1] = 0.95;
            coreClusterColors[i * 3 + 2] = 0.8;
        }
        const coreClusterGeom = new THREE.BufferGeometry();
        coreClusterGeom.setAttribute('position', new THREE.BufferAttribute(coreClusterPositions, 3));
        coreClusterGeom.setAttribute('color', new THREE.BufferAttribute(coreClusterColors, 3));
        const coreClusterMat = new THREE.PointsMaterial({
            size: 0.22,
            map: starSpriteTex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.95,
            sizeAttenuation: true
        });
        galaxyGroup.add(new THREE.Points(coreClusterGeom, coreClusterMat));

        const brightStarCount = 800;
        const brightStarPositions = new Float32Array(brightStarCount * 3);
        const brightStarColors = new Float32Array(brightStarCount * 3);
        for (let i = 0; i < brightStarCount; i++) {
            const arm = Math.floor(Math.random() * numArms);
            const baseAngle = arm * Math.PI * 2 / numArms;
            const t = Math.random();
            const r = t * galaxyRadius;
            const spiralAngle = baseAngle + t * armTightness * Math.PI;
            const angle = spiralAngle + (Math.random() - 0.5) * 0.6;
            brightStarPositions[i * 3] = Math.cos(angle) * r;
            brightStarPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.4;
            brightStarPositions[i * 3 + 2] = Math.sin(angle) * r;
            const isBlue = Math.random() < 0.35;
            brightStarColors[i * 3] = isBlue ? 0.55 + Math.random() * 0.3 : 0.8 + Math.random() * 0.2;
            brightStarColors[i * 3 + 1] = isBlue ? 0.65 + Math.random() * 0.25 : 0.75 + Math.random() * 0.2;
            brightStarColors[i * 3 + 2] = isBlue ? 0.9 + Math.random() * 0.1 : 0.5 + Math.random() * 0.4;
        }
        const brightStarGeom = new THREE.BufferGeometry();
        brightStarGeom.setAttribute('position', new THREE.BufferAttribute(brightStarPositions, 3));
        brightStarGeom.setAttribute('color', new THREE.BufferAttribute(brightStarColors, 3));
        const brightStarMat = new THREE.PointsMaterial({
            size: 0.28,
            map: starSpriteTex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.8,
            sizeAttenuation: true
        });
        galaxyGroup.add(new THREE.Points(brightStarGeom, brightStarMat));

        function createNebulaSprite(c1, c2, size, op = 0.4) {
            const c = document.createElement('canvas');
            c.width = 512;
            c.height = 512;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
            g.addColorStop(0, c1);
            g.addColorStop(0.5, c2);
            g.addColorStop(1, 'transparent');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, 512, 512);
            ctx.globalCompositeOperation = 'overlay';
            for (let i = 0; i < 100; i++) {
                ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`;
                ctx.beginPath();
                ctx.arc(Math.random() * 512, Math.random() * 512, Math.random() * 20, 0, Math.PI * 2);
                ctx.fill();
            }
            const tex = new THREE.CanvasTexture(c);
            const mat = new THREE.SpriteMaterial({
                map: tex,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: op
            });
            const s = new THREE.Sprite(mat);
            s.scale.set(size, size, 1);
            return s;
        }

        const nebula1 = createNebulaSprite('#442288', '#220066', 35, 0.25);
        nebula1.position.set(5, -2, -10);
        scene.add(nebula1);
        const nebula2 = createNebulaSprite('#882244', '#440022', 30, 0.2);
        nebula2.position.set(-8, 3, -12);
        scene.add(nebula2);

        const bgStarCount = 3000;
        const bgStarPositions = new Float32Array(bgStarCount * 3);
        const bgStarColors = new Float32Array(bgStarCount * 3);
        const bgRadius = 55;
        for (let i = 0; i < bgStarCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 20 + Math.random() * (bgRadius - 20);
            bgStarPositions[i * 3] = Math.sin(phi) * Math.cos(theta) * r;
            bgStarPositions[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * r;
            bgStarPositions[i * 3 + 2] = Math.cos(phi) * r;
            const br = 0.4 + Math.random() * 0.6;
            const tint = Math.random();
            bgStarColors[i * 3] = br * (0.7 + tint * 0.3);
            bgStarColors[i * 3 + 1] = br * (0.7 + tint * 0.3);
            bgStarColors[i * 3 + 2] = br * (0.8 + tint * 0.2);
        }
        const bgStarGeom = new THREE.BufferGeometry();
        bgStarGeom.setAttribute('position', new THREE.BufferAttribute(bgStarPositions, 3));
        bgStarGeom.setAttribute('color', new THREE.BufferAttribute(bgStarColors, 3));
        const bgStarMat = new THREE.PointsMaterial({
            size: 0.08,
            map: starSpriteTex,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true,
            opacity: 0.7,
            sizeAttenuation: true
        });
        const bgStars = new THREE.Points(bgStarGeom, bgStarMat);
        scene.add(bgStars);

        const clock = new THREE.Clock();

        function animate(ts) {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const el = ts * 0.001;

            galaxyGroup.rotation.y += 0.025 * dt;
            bgStars.rotation.y += 0.008 * dt;
            bgStars.rotation.x += 0.004 * dt;
            nebula1.rotation.z += 0.001 * dt;
            nebula2.rotation.z -= 0.001 * dt;

            const cp = 1 + Math.sin(el * 0.7) * 0.06;
            coreGlowSprite.scale.set(7 * cp, 7 * cp, 1);
            coreGlowSprite.material.opacity = 0.7 + Math.sin(el * 0.9) * 0.08;

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.addEventListener('resize', onResize, { passive: true });
        window.addEventListener('orientationchange', () => setTimeout(onResize, 200), { passive: true });

        requestAnimationFrame(animate);

        window.addEventListener('keydown', e => {
            if (e.key === '1') window.location.href = 'ssc.html';
            if (e.key === '2') window.location.href = 'defence.html';
            if (e.key === '3') window.location.href = 'wbpsc.html';
        });

        console.log('%c✨ মহাজাগতিক পটভূমি প্রস্তুত! %c| Cosmic background ready', 'font-size:1.3em;color:#FFB74D;', 'color:#aaa;');
    </script>
</body>
</html>
